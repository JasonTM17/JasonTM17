name: Sync public project archive

on:
  schedule:
    - cron: "23,53 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-project-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh README from public GitHub projects
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the profile repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Test the project synchronizer
        run: node --test scripts/sync-public-projects.test.mjs

      - name: Refresh managed README sections
        run: node scripts/sync-public-projects.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes or keep the schedule active
        shell: bash
        run: |
          now="$(date +%s)"
          last_commit="$(git log -1 --format=%ct)"
          age_days="$(( (now - last_commit) / 86400 ))"

          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "feat(profile): sync public project archive"
          elif (( age_days >= 45 )); then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "ci(profile): keep scheduled sync active"
          else
            echo "README already matches the public repository snapshot; next heartbeat is not due."
            exit 0
          fi

          git push
