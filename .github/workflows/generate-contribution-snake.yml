name: Update contribution animation

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/generate-contribution-snake.yml"

permissions:
  contents: write

concurrency:
  group: contribution-animation
  cancel-in-progress: false

jobs:
  generate:
    name: Generate contribution snake
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate animated contribution SVGs
        uses: Platane/snk/svg-only@v3.5.0
        with:
          github_user_name: JasonTM17
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update contribution animation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
