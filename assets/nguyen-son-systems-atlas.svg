<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Nguyen Son systems atlas</title>
  <desc id="desc">An original dark systems map representing Nguyen Son's public work across product systems, realtime operations, applied AI, and platform engineering.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f" />
      <stop offset="0.52" stop-color="#0a1a31" />
      <stop offset="1" stop-color="#120d2b" />
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.05" />
      <stop offset="0.45" stop-color="#38bdf8" stop-opacity="0.92" />
      <stop offset="1" stop-color="#c084fc" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#background)" />
  <rect width="1600" height="520" rx="28" fill="url(#grid)" />
  <circle cx="1150" cy="165" r="290" fill="url(#glow)" />
  <circle cx="1400" cy="410" r="240" fill="#8b5cf6" opacity="0.07" />
  <rect x="1" y="1" width="1598" height="518" rx="27" fill="none" stroke="#7dd3fc" stroke-opacity="0.18" />

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="88" y="104" fill="#7dd3fc" font-size="20" font-weight="700" letter-spacing="5">NGUYEN SON // SYSTEMS ATLAS</text>
    <text x="88" y="172" fill="#f8fafc" font-size="54" font-weight="700">Build products.</text>
    <text x="88" y="232" fill="#f8fafc" font-size="54" font-weight="700">Connect systems.</text>
    <text x="88" y="286" fill="#94a3b8" font-size="22">Web, mobile, AI, and platform work shaped into connected experiences.</text>

    <g transform="translate(88 354)">
      <rect width="242" height="74" rx="14" fill="#0f2741" stroke="#38bdf8" stroke-opacity="0.45" />
      <text x="22" y="29" fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="2">01 / PRODUCT</text>
      <text x="22" y="55" fill="#e2e8f0" font-size="17">FoodFlow · TravelAI</text>

      <rect x="260" width="242" height="74" rx="14" fill="#0f2741" stroke="#38bdf8" stroke-opacity="0.45" />
      <text x="282" y="29" fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="2">02 / REALTIME</text>
      <text x="282" y="55" fill="#e2e8f0" font-size="17">Crab · Operations</text>

      <rect x="520" width="242" height="74" rx="14" fill="#18224a" stroke="#a78bfa" stroke-opacity="0.5" />
      <text x="542" y="29" fill="#c4b5fd" font-size="13" font-weight="700" letter-spacing="2">03 / APPLIED AI</text>
      <text x="542" y="55" fill="#e2e8f0" font-size="17">Vision · Search Labs</text>
    </g>
  </g>

  <g fill="none" stroke="url(#line)" stroke-width="3">
    <path d="M 926 122 C 1040 70, 1110 102, 1196 170 S 1376 268, 1496 184" />
    <path d="M 894 254 C 1030 188, 1112 244, 1215 302 S 1368 353, 1494 320" />
    <path d="M 962 396 C 1042 337, 1118 376, 1198 420 S 1372 437, 1486 408" />
    <path d="M 1048 112 C 1072 198, 1064 302, 1136 388" stroke-dasharray="10 10" opacity="0.72" />
    <path d="M 1260 162 C 1242 232, 1256 302, 1328 372" stroke-dasharray="10 10" opacity="0.72" />
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(900 94)">
      <circle r="12" fill="#38bdf8" filter="url(#softGlow)" />
      <circle r="5" fill="#e0f2fe" />
      <text x="24" y="6" fill="#dbeafe" font-size="17" font-weight="700">WEB</text>
    </g>
    <g transform="translate(1196 170)">
      <circle r="14" fill="#22c55e" filter="url(#softGlow)" />
      <circle r="5" fill="#dcfce7" />
      <text x="25" y="6" fill="#dbeafe" font-size="17" font-weight="700">MOBILE</text>
    </g>
    <g transform="translate(1496 184)">
      <circle r="12" fill="#a78bfa" filter="url(#softGlow)" />
      <circle r="5" fill="#f3e8ff" />
      <text x="-20" y="-22" fill="#dbeafe" font-size="17" font-weight="700" text-anchor="end">AI</text>
    </g>
    <g transform="translate(894 254)">
      <circle r="12" fill="#f59e0b" filter="url(#softGlow)" />
      <circle r="5" fill="#fef3c7" />
      <text x="24" y="6" fill="#dbeafe" font-size="17" font-weight="700">APIs</text>
    </g>
    <g transform="translate(1215 302)">
      <circle r="15" fill="#38bdf8" filter="url(#softGlow)" />
      <circle r="5" fill="#e0f2fe" />
      <text x="26" y="6" fill="#dbeafe" font-size="17" font-weight="700">DATA</text>
    </g>
    <g transform="translate(1494 320)">
      <circle r="12" fill="#22c55e" filter="url(#softGlow)" />
      <circle r="5" fill="#dcfce7" />
      <text x="-20" y="-22" fill="#dbeafe" font-size="17" font-weight="700" text-anchor="end">OPS</text>
    </g>
    <g transform="translate(962 396)">
      <circle r="12" fill="#a78bfa" filter="url(#softGlow)" />
      <circle r="5" fill="#f3e8ff" />
      <text x="24" y="6" fill="#dbeafe" font-size="17" font-weight="700">CLOUD</text>
    </g>
    <g transform="translate(1198 420)">
      <circle r="15" fill="url(#accent)" filter="url(#softGlow)" />
      <circle r="5" fill="#ffffff" />
      <text x="26" y="6" fill="#dbeafe" font-size="17" font-weight="700">PLATFORM</text>
    </g>
    <g transform="translate(1486 408)">
      <circle r="12" fill="#f59e0b" filter="url(#softGlow)" />
      <circle r="5" fill="#fef3c7" />
      <text x="-20" y="-22" fill="#dbeafe" font-size="17" font-weight="700" text-anchor="end">SHIP</text>
    </g>
  </g>

  <g transform="translate(1434 72)" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">
    <text fill="#64748b" font-size="13" font-weight="700" letter-spacing="2">PUBLIC BUILD LOG</text>
    <text y="30" fill="#f8fafc" font-size="24" font-weight="700">19 PROJECTS</text>
  </g>
</svg>
